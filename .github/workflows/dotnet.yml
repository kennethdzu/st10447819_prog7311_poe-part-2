name: .NET Core Unit Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore TechMove.Glms.sln
    - name: Build
      run: dotnet build TechMove.Glms.sln --no-restore
    - name: Test
      run: dotnet test TechMove.Glms.Tests/TechMove.Glms.Tests.csproj --no-build --verbosity normal
